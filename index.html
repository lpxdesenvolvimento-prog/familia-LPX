<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Família Connect - Com Fotos de Perfil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; }
        .app { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; }
        
        /* Login */
        .login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; border-radius: 30px; padding: 40px 25px; width: 90%; max-width: 350px; text-align: center; }
        .login-box h1 { color: #667eea; margin-bottom: 30px; }
        .perfil-opcao { display: inline-block; margin: 10px; padding: 15px 25px; border: 2px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 18px; }
        .perfil-opcao.selected { border-color: #667eea; background: #f0f0ff; }
        .perfil-opcao .avatar-mini { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 5px; }
        .input-senha { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 15px; margin: 15px 0; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Navegação */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: white; display: flex; justify-content: space-around; padding: 12px 20px; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; cursor: pointer; padding: 5px; flex: 1; }
        .nav-item.active { color: #667eea; transform: translateY(-3px); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 12px; margin-top: 4px; }
        
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 99; }
        .fab { position: fixed; bottom: 80px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 200; }
        
        /* Perfil Header */
        .profile-header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 30px 20px; text-align: center; color: white; position: relative; }
        .profile-avatar { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar span { font-size: 50px; }
        .edit-avatar-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }
        .profile-name { font-size: 24px; margin-bottom: 5px; }
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .stat { text-align: center; }
        .stat-number { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        
        .post { background: white; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .post-header { display: flex; padding: 12px; gap: 10px; align-items: center; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 25px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-nome { font-weight: bold; }
        .post-data { font-size: 11px; color: #999; }
        .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; }
        .post-legenda { padding: 12px; }
        .post-acoes { padding: 8px 12px; display: flex; gap: 20px; border-top: 1px solid #eee; }
        .acao { background: none; border: none; display: flex; gap: 5px; cursor: pointer; color: #666; font-size: 14px; }
        .acao.liked { color: #e74c3c; }
        .comentarios { padding: 10px 12px; background: #fafafa; }
        .comentario { font-size: 13px; margin-bottom: 5px; }
        .add-comentario { display: flex; padding: 10px; gap: 10px; background: white; }
        .add-comentario input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 20px; }
        .add-comentario button { background: #667eea; color: white; border: none; border-radius: 20px; padding: 8px 15px; cursor: pointer; }
        
        .loading, .empty { text-align: center; padding: 50px; color: #999; }
        
        /* Modal de avatar */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 20px; text-align: center; }
        .upload-avatar-area { border: 2px dashed #ddd; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; margin: 15px 0; }
        .preview-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: block; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============================================================
    // BANCO DE DADOS
    // ============================================================
    
    let USUARIO_ATUAL = null;
    let POSTS = [];
    let AVATARES = {}; // Armazena as fotos de perfil
    
    let ABA_ATUAL = 'feed'; // 'feed' ou 'perfil'
    
    const CHAVE_POSTS = 'familia_connect_posts';
    const CHAVE_SESSAO = 'familia_connect_sessao';
    const CHAVE_AVATARES = 'familia_connect_avatares';
    
    function carregarAvatares() {
        const salvos = localStorage.getItem(CHAVE_AVATARES);
        if (salvos) {
            try {
                AVATARES = JSON.parse(salvos);
                console.log('Avatares carregados:', AVATARES);
            } catch(e) {}
        }
    }
    
    function salvarAvatares() {
        localStorage.setItem(CHAVE_AVATARES, JSON.stringify(AVATARES));
    }
    
    function getAvatar(usuarioId) {
        if (AVATARES[usuarioId]) {
            return `<img src="${AVATARES[usuarioId]}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        return usuarioId === 'pai' ? '👨' : '👩';
    }
    
    function getAvatarUrl(usuarioId) {
        return AVATARES[usuarioId] || null;
    }
    
    function setAvatar(usuarioId, avatarData) {
        AVATARES[usuarioId] = avatarData;
        salvarAvatares();
        
        // Atualizar também nos posts existentes (os avatares não ficam salvos nos posts, mas podemos atualizar a exibição)
        renderizarConteudo();
    }
    
    function carregarPosts() {
        const salvos = localStorage.getItem(CHAVE_POSTS);
        if (salvos) {
            try {
                POSTS = JSON.parse(salvos);
                console.log('Posts carregados:', POSTS.length);
                if (POSTS.length === 0) {
                    criarPostsExemplo();
                }
                return;
            } catch(e) {}
        }
        criarPostsExemplo();
    }
    
    function criarPostsExemplo() {
        POSTS = [
            {
                id: Date.now() + 1,
                usuarioId: 'mae',
                usuarioNome: 'Mamãe 👩',
                tipo: 'foto',
                midia: 'https://picsum.photos/id/20/400/400',
                legenda: 'Dia especial em família! 💕',
                data: new Date().toISOString(),
                curtidas: [],
                comentarios: []
            },
            {
                id: Date.now() + 2,
                usuarioId: 'pai',
                usuarioNome: 'Papai 👨',
                tipo: 'foto',
                midia: 'https://picsum.photos/id/15/400/400',
                legenda: 'Final de semana top! 🎉',
                data: new Date(Date.now() - 86400000).toISOString(),
                curtidas: [],
                comentarios: []
            }
        ];
        salvarPosts();
    }
    
    function salvarPosts() {
        localStorage.setItem(CHAVE_POSTS, JSON.stringify(POSTS));
        console.log('Posts salvos:', POSTS.length);
    }
    
    function salvarSessao(usuario, manter) {
        const sessao = {
            usuarioId: usuario.id,
            usuarioNome: usuario.nome,
            expira: manter ? Date.now() + (30 * 24 * 60 * 60 * 1000) : Date.now() + (24 * 60 * 60 * 1000)
        };
        localStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
    }
    
    function carregarSessao() {
        const salva = localStorage.getItem(CHAVE_SESSAO);
        if (salva) {
            try {
                const sessao = JSON.parse(salva);
                if (sessao.expira > Date.now()) {
                    USUARIO_ATUAL = {
                        id: sessao.usuarioId,
                        nome: sessao.usuarioNome,
                        senha: sessao.usuarioId === 'pai' ? 'pai123' : 'mae123'
                    };
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    
    function limparSessao() {
        localStorage.removeItem(CHAVE_SESSAO);
    }
    
    // ============================================================
    // FUNÇÕES DO APP
    // ============================================================
    
    function adicionarPost(tipo, midia, legenda) {
        const novoPost = {
            id: Date.now(),
            usuarioId: USUARIO_ATUAL.id,
            usuarioNome: USUARIO_ATUAL.nome,
            tipo: tipo,
            midia: midia,
            legenda: legenda || '',
            data: new Date().toISOString(),
            curtidas: [],
            comentarios: []
        };
        POSTS.unshift(novoPost);
        salvarPosts();
        renderizarConteudo();
        return true;
    }
    
    function curtirPost(id) {
        const post = POSTS.find(p => p.id === id);
        if (post) {
            const index = post.curtidas.indexOf(USUARIO_ATUAL.id);
            if (index === -1) {
                post.curtidas.push(USUARIO_ATUAL.id);
            } else {
                post.curtidas.splice(index, 1);
            }
            salvarPosts();
            renderizarConteudo();
        }
    }
    
    function comentarPost(id) {
        const input = document.getElementById(`comentario_${id}`);
        if (!input) return;
        const texto = input.value.trim();
        if (!texto) return;
        
        const post = POSTS.find(p => p.id === id);
        if (post) {
            post.comentarios.push({
                usuarioId: USUARIO_ATUAL.id,
                usuarioNome: USUARIO_ATUAL.nome,
                texto: texto,
                data: new Date().toISOString()
            });
            salvarPosts();
            input.value = '';
            renderizarConteudo();
        }
    }
    
    function excluirPost(id) {
        const post = POSTS.find(p => p.id === id);
        if (post && post.usuarioId === USUARIO_ATUAL.id) {
            if (confirm('Tem certeza que quer excluir este post?')) {
                POSTS = POSTS.filter(p => p.id !== id);
                salvarPosts();
                renderizarConteudo();
            }
        }
    }
    
    function abrirUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const legenda = prompt('Digite uma legenda:', '');
            const tipo = file.type.startsWith('image/') ? 'foto' : 'video';
            const reader = new FileReader();
            
            reader.onload = (event) => {
                adicionarPost(tipo, event.target.result, legenda);
                alert('✅ Post publicado com sucesso!');
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }
    
    function abrirModalAvatar() {
        const modalHtml = `
            <div class="modal" id="avatarModal">
                <div class="modal-content">
                    <h3>📸 Foto de Perfil</h3>
                    <div class="upload-avatar-area" id="uploadAvatarArea">
                        📁 Clique para selecionar uma foto
                    </div>
                    <input type="file" id="avatarFileInput" accept="image/*" style="display: none;">
                    <div id="avatarPreview"></div>
                    <button class="btn" id="salvarAvatarBtn" style="margin-top: 15px;">💾 Salvar Foto</button>
                    <button onclick="fecharModal()" style="margin-top: 10px; background: #ccc; color: #333;" class="btn">Cancelar</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        let selectedFile = null;
        const uploadArea = document.getElementById('uploadAvatarArea');
        const fileInput = document.getElementById('avatarFileInput');
        const previewDiv = document.getElementById('avatarPreview');
        
        uploadArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                previewDiv.innerHTML = `<img src="${url}" class="preview-avatar">`;
            }
        };
        
        document.getElementById('salvarAvatarBtn').onclick = () => {
            if (!selectedFile) {
                alert('Selecione uma foto primeiro!');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (event) => {
                setAvatar(USUARIO_ATUAL.id, event.target.result);
                alert('✅ Foto de perfil atualizada!');
                fecharModal();
                renderizarConteudo();
            };
            reader.readAsDataURL(selectedFile);
        };
    }
    
    function fecharModal() {
        const modal = document.querySelector('.modal');
        if (modal) modal.remove();
    }
    
    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    
    function formatarData(dataISO) {
        const data = new Date(dataISO);
        const diff = Date.now() - data;
        if (diff < 60000) return 'Agora mesmo';
        if (diff < 3600000) return `${Math.floor(diff / 60000)} minutos`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)} horas`;
        return data.toLocaleDateString('pt-BR');
    }
    
    function getMeusPosts() {
        return POSTS.filter(post => post.usuarioId === USUARIO_ATUAL.id);
    }
    
    function renderizarFeed() {
        if (POSTS.length === 0) {
            return '<div class="empty">📭 Nenhum post ainda. Clique no + para começar!</div>';
        }
        
        return POSTS.map(post => `
            <div class="post">
                <div class="post-header">
                    <div class="avatar">
                        ${getAvatar(post.usuarioId)}
                    </div>
                    <div style="flex:1">
                        <div class="post-nome">${post.usuarioNome}</div>
                        <div class="post-data">${formatarData(post.data)}</div>
                    </div>
                    ${post.usuarioId === USUARIO_ATUAL.id ? `<button onclick="excluirPost(${post.id})" style="background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>` : ''}
                </div>
                <div class="post-media">
                    ${post.tipo === 'foto' 
                        ? `<img src="${post.midia}" loading="lazy" onerror="this.src='https://picsum.photos/400/400'">`
                        : `<video src="${post.midia}" controls></video>`}
                </div>
                ${post.legenda ? `<div class="post-legenda">💬 ${post.legenda}</div>` : ''}
                <div class="post-acoes">
                    <button class="acao ${post.curtidas.includes(USUARIO_ATUAL.id) ? 'liked' : ''}" onclick="curtirPost(${post.id})">
                        ❤️ ${post.curtidas.length}
                    </button>
                    <button class="acao" onclick="document.getElementById('comentario_${post.id}').focus()">
                        💬 ${post.comentarios.length}
                    </button>
                </div>
                <div class="comentarios">
                    ${post.comentarios.slice(-3).map(c => `
                        <div class="comentario"><strong>${c.usuarioNome}:</strong> ${c.texto}</div>
                    `).join('')}
                </div>
                <div class="add-comentario">
                    <input type="text" id="comentario_${post.id}" placeholder="Escreva um comentário...">
                    <button onclick="comentarPost(${post.id})">Enviar</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderizarPerfil() {
        const meusPosts = getMeusPosts();
        const totalCurtidas = meusPosts.reduce((sum, post) => sum + post.curtidas.length, 0);
        
        return `
            <div class="profile-header">
                <div class="profile-avatar" onclick="abrirModalAvatar()">
                    ${AVATARES[USUARIO_ATUAL.id] 
                        ? `<img src="${AVATARES[USUARIO_ATUAL.id]}" style="width:100%; height:100%; object-fit:cover;">` 
                        : `<span>${USUARIO_ATUAL.id === 'pai' ? '👨' : '👩'}</span>`
                    }
                    <div class="edit-avatar-btn">📷</div>
                </div>
                <div class="profile-name">${USUARIO_ATUAL.nome}</div>
                <div class="profile-stats">
                    <div class="stat"><div class="stat-number">${meusPosts.length}</div><div class="stat-label">Posts</div></div>
                    <div class="stat"><div class="stat-number">${totalCurtidas}</div><div class="stat-label">Curtidas</div></div>
                </div>
                <div style="margin-top: 15px; font-size: 12px; opacity: 0.8;">👆 Clique na foto para alterar</div>
            </div>
            <div style="padding: 15px;">
                <h3 style="margin-bottom: 15px;">📸 Minhas Publicações</h3>
            </div>
            ${meusPosts.length === 0 ? '<div class="empty">📭 Você ainda não tem posts. Clique no + para começar!</div>' : meusPosts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="avatar">
                            ${getAvatar(post.usuarioId)}
                        </div>
                        <div style="flex:1">
                            <div class="post-nome">${post.usuarioNome}</div>
                            <div class="post-data">${formatarData(post.data)}</div>
                        </div>
                        <button onclick="excluirPost(${post.id})" style="background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>
                    </div>
                    <div class="post-media">
                        ${post.tipo === 'foto' 
                            ? `<img src="${post.midia}" loading="lazy" onerror="this.src='https://picsum.photos/400/400'">`
                            : `<video src="${post.midia}" controls></video>`}
                    </div>
                    ${post.legenda ? `<div class="post-legenda">💬 ${post.legenda}</div>` : ''}
                    <div class="post-acoes">
                        <button class="acao ${post.curtidas.includes(USUARIO_ATUAL.id) ? 'liked' : ''}" onclick="curtirPost(${post.id})">
                            ❤️ ${post.curtidas.length}
                        </button>
                        <button class="acao" onclick="document.getElementById('comentario_${post.id}').focus()">
                            💬 ${post.comentarios.length}
                        </button>
                    </div>
                    <div class="comentarios">
                        ${post.comentarios.slice(-2).map(c => `
                            <div class="comentario"><strong>${c.usuarioNome}:</strong> ${c.texto}</div>
                        `).join('')}
                    </div>
                    <div class="add-comentario">
                        <input type="text" id="comentario_${post.id}" placeholder="Escreva um comentário...">
                        <button onclick="comentarPost(${post.id})">Enviar</button>
                    </div>
                </div>
            `).join('')}
        `;
    }
    
    function renderizarConteudo() {
        const container = document.getElementById('mainContainer');
        if (!container) return;
        
        if (ABA_ATUAL === 'feed') {
            container.innerHTML = renderizarFeed();
        } else {
            container.innerHTML = renderizarPerfil();
        }
    }
    
    function mudarAba(aba) {
        ABA_ATUAL = aba;
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.tab === aba) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
        renderizarConteudo();
    }
    
    function fazerLogin() {
        const perfilSelecionado = document.getElementById('perfilSelecionado')?.value || 'pai';
        const senha = document.getElementById('senhaLogin')?.value || '';
        const manter = document.getElementById('manterLogin')?.checked || false;
        const senhaCorreta = perfilSelecionado === 'pai' ? 'pai123' : 'mae123';
        
        if (senha === senhaCorreta) {
            USUARIO_ATUAL = {
                id: perfilSelecionado,
                nome: perfilSelecionado === 'pai' ? 'Papai 👨' : 'Mamãe 👩',
                senha: senhaCorreta
            };
            salvarSessao(USUARIO_ATUAL, manter);
            renderizarApp();
        } else {
            alert('❌ Senha incorreta!\n\n👨 Papai: pai123\n👩 Mamãe: mae123');
        }
    }
    
    function sair() {
        USUARIO_ATUAL = null;
        limparSessao();
        renderizarApp();
    }
    
    function selecionarPerfil(perfil) {
        document.getElementById('perfilSelecionado').value = perfil;
        document.querySelectorAll('[data-perfil]').forEach(el => {
            el.classList.remove('selected');
        });
        document.querySelector(`[data-perfil="${perfil}"]`)?.classList.add('selected');
    }
    
    function renderizarApp() {
        const appDiv = document.getElementById('app');
        if (!appDiv) return;
        
        // Tela de login
        if (!USUARIO_ATUAL) {
            appDiv.innerHTML = `
                <div class="login-screen">
                    <div class="login-box">
                        <h1>📱 Família Connect</h1>
                        <div>
                            <div class="perfil-opcao" data-perfil="pai" onclick="selecionarPerfil('pai')">
                                <div class="avatar-mini">${AVATARES['pai'] ? `<img src="${AVATARES['pai']}" class="avatar-mini">` : '👨'}</div>
                                Papai
                            </div>
                            <div class="perfil-opcao" data-perfil="mae" onclick="selecionarPerfil('mae')">
                                <div class="avatar-mini">${AVATARES['mae'] ? `<img src="${AVATARES['mae']}" class="avatar-mini">` : '👩'}</div>
                                Mamãe
                            </div>
                        </div>
                        <input type="hidden" id="perfilSelecionado" value="pai">
                        <input type="password" id="senhaLogin" class="input-senha" placeholder="Digite sua senha">
                        <label style="display:flex; align-items:center; gap:8px; margin:10px 0;">
                            <input type="checkbox" id="manterLogin"> Manter-me conectado
                        </label>
                        <button class="btn" onclick="fazerLogin()">✨ Entrar ✨</button>
                        <div style="margin-top:20px; font-size:12px; color:#999;">👨 Senha: pai123 | 👩 Senha: mae123</div>
                    </div>
                </div>
            `;
            document.querySelector('[data-perfil="pai"]')?.classList.add('selected');
            return;
        }
        
        // Tela principal com navegação
        appDiv.innerHTML = `
            <div class="header">
                <h2 style="color:#667eea;">📱 Família Connect</h2>
                <div>
                    <span style="margin-right:15px;">👤 ${USUARIO_ATUAL.nome}</span>
                    <button onclick="sair()" style="background:none; border:none; font-size:20px; cursor:pointer;">🚪</button>
                </div>
            </div>
            <div id="mainContainer" style="padding-bottom: 80px;"></div>
            <button class="fab" onclick="abrirUpload()">+</button>
            <div class="bottom-nav">
                <div class="nav-item ${ABA_ATUAL === 'feed' ? 'active' : ''}" data-tab="feed" onclick="mudarAba('feed')">
                    <div class="nav-icon">📱</div>
                    <div class="nav-label">Feed</div>
                </div>
                <div class="nav-item ${ABA_ATUAL === 'perfil' ? 'active' : ''}" data-tab="perfil" onclick="mudarAba('perfil')">
                    <div class="nav-icon">👤</div>
                    <div class="nav-label">Meu Perfil</div>
                </div>
            </div>
        `;
        
        renderizarConteudo();
    }
    
    // ============================================================
    // EXPOR FUNÇÕES GLOBALMENTE
    // ============================================================
    
    window.fazerLogin = fazerLogin;
    window.selecionarPerfil = selecionarPerfil;
    window.abrirUpload = abrirUpload;
    window.curtirPost = curtirPost;
    window.comentarPost = comentarPost;
    window.excluirPost = excluirPost;
    window.sair = sair;
    window.mudarAba = mudarAba;
    window.abrirModalAvatar = abrirModalAvatar;
    window.fecharModal = fecharModal;
    
    // ============================================================
    // INICIAR APP
    // ============================================================
    
    carregarAvatares();
    carregarPosts();
    carregarSessao();
    renderizarApp();
    
    console.log('🚀 App iniciado com sucesso!');
    console.log('📸 Avatares:', AVATARES);
</script>
