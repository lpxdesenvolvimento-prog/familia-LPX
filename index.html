<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Família Connect - App Completo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        .emoji-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .floating-emoji {
            position: absolute;
            font-size: 30px;
            animation: floatUp 2.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(50vh) scale(1.2) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(0.8) rotate(360deg);
                opacity: 0;
            }
        }

        /* Tela de Login */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .login-box h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .perfil-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .perfil-card {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .perfil-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f0ff 0%, #fff 100%);
        }

        .perfil-avatar {
            font-size: 45px;
            display: block;
            margin-bottom: 8px;
        }

        .perfil-nome {
            font-weight: 700;
            font-size: 16px;
        }

        .input-senha {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .checkbox-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .login-btn:active { transform: scale(0.98); }

        .feed-header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-area h2 {
            font-size: 18px;
            color: #667eea;
        }

        .online-badge {
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 5px;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: #667eea;
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            margin-top: 3px;
        }

        .main-content {
            padding-bottom: 70px;
            padding-top: 10px;
        }

        .post {
            background: white;
            margin-bottom: 12px;
            border-radius: 0;
        }

        .post-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            background: #f0f0f0;
        }

        .post-avatar-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-info {
            flex: 1;
        }

        .post-nome {
            font-weight: 700;
            font-size: 15px;
        }

        .post-data {
            font-size: 11px;
            color: #999;
        }

        .post-media {
            width: 100%;
            background: #f5f5f5;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .post-media img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }

        .post-media video {
            width: 100%;
            max-height: 500px;
            background: #000;
        }

        .live-badge-post {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #dc3545;
            color: white;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            z-index: 5;
        }

        .post-legenda {
            padding: 12px 15px;
            font-size: 14px;
        }

        .post-actions {
            padding: 8px 15px;
            display: flex;
            gap: 25px;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 6px 0;
        }

        .action-btn.liked {
            color: #dc3545;
        }

        .comentarios-area {
            padding: 10px 15px;
            background: #fafafa;
        }

        .comentario {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .comentario strong {
            color: #667eea;
        }

        .add-comentario {
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            background: white;
        }

        .add-comentario input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #eee;
            border-radius: 25px;
            font-size: 13px;
            background: #f5f5f5;
        }

        .add-comentario button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 18px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 18px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .avatar-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .avatar-option {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .avatar-option.selected {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .upload-avatar {
            border: 2px dashed #ddd;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin: 15px 0;
            background: #f9f9f9;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #667eea;
            transition: width 0.3s;
        }

        /* Live */
        .live-container {
            background: #000;
            min-height: 100vh;
            position: relative;
        }

        .live-video {
            width: 100%;
            height: 60vh;
            background: #111;
            position: relative;
        }

        .live-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-control {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            padding: 12px;
            z-index: 20;
        }

        .camera-control button {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }

        .live-info {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .live-badge {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .live-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .live-actions button {
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 50%;
            padding: 12px;
            font-size: 28px;
            cursor: pointer;
        }

        .live-chat {
            background: rgba(0,0,0,0.7);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .live-message {
            color: white;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .live-message strong {
            color: #ff69b4;
        }

        .live-input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            gap: 10px;
        }

        .live-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #333;
            color: white;
        }

        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 55px;
            height: 55px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 200;
            border: none;
            font-size: 28px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        /* Botões da câmera */
        .camera-buttons {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .camera-btn {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .camera-btn:active { transform: scale(0.98); }

        .camera-preview {
            width: 100%;
            background: #000;
            border-radius: 15px;
            margin: 10px 0;
            position: relative;
        }

        .camera-preview video, .camera-preview img {
            width: 100%;
            border-radius: 15px;
            max-height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="app" id="app"></div>

    <script>
        let USUARIOS = {
            pai: { id: 'pai', nome: 'Papai 👨', senha: 'pai123', avatar: '👨', avatarImg: null, status: 'online' },
            mae: { id: 'mae', nome: 'Mamãe 👩', senha: 'mae123', avatar: '👩', avatarImg: null, status: 'online' }
        };

        let state = {
            currentUser: null,
            posts: [],
            keepLoggedIn: false,
            activeTab: 'feed',
            liveActive: false,
            liveMessages: [],
            liveLikes: 0,
            liveStream: null,
            cameraFacing: 'user',
            mediaRecorder: null,
            recordedChunks: []
        };

        // Camera state for photo/video capture
        let cameraStream = null;
        let isRecording = false;

        const EMOJIS_RAIN = ['❤️', '💕', '💖', '💗', '💓', '💝', '💟', '♥️', '😍', '🥰', '😘', '💋', '🌸', '🌹', '⭐', '✨', '🎉', '🎊'];

        function criarChuvaEmojis() {
            const container = document.createElement('div');
            container.className = 'emoji-container';
            document.body.appendChild(container);
            
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const emoji = EMOJIS_RAIN[Math.floor(Math.random() * EMOJIS_RAIN.length)];
                    const emojiDiv = document.createElement('div');
                    emojiDiv.className = 'floating-emoji';
                    emojiDiv.textContent = emoji;
                    emojiDiv.style.left = Math.random() * 100 + '%';
                    emojiDiv.style.fontSize = (Math.random() * 25 + 20) + 'px';
                    emojiDiv.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    container.appendChild(emojiDiv);
                    
                    setTimeout(() => {
                        emojiDiv.remove();
                        if (container.children.length === 0) container.remove();
                    }, 2500);
                }, i * 50);
            }
        }

        function loadData() {
            const savedPosts = localStorage.getItem('familia_pro_data_v2');
            if (savedPosts) {
                try {
                    state.posts = JSON.parse(savedPosts);
                    console.log('Posts carregados:', state.posts.length);
                } catch(e) {
                    state.posts = [];
                }
            }
            
            if (!state.posts || state.posts.length === 0) {
                state.posts = [
                    {
                        id: '1',
                        usuarioId: 'mae',
                        usuarioNome: 'Mamãe 👩',
                        tipo: 'foto',
                        dataUrl: 'https://picsum.photos/id/20/400/400',
                        legenda: 'Dia especial em família! 💕',
                        data: new Date(Date.now() - 86400000).toISOString(),
                        curtidas: ['pai'],
                        comentarios: [{ usuarioId: 'pai', usuarioNome: 'Papai 👨', texto: 'Que lindo! 🥰' }]
                    },
                    {
                        id: '2',
                        usuarioId: 'pai',
                        usuarioNome: 'Papai 👨',
                        tipo: 'foto',
                        dataUrl: 'https://picsum.photos/id/100/400/400',
                        legenda: 'Almoço em família 🍝',
                        data: new Date(Date.now() - 172800000).toISOString(),
                        curtidas: ['mae'],
                        comentarios: [{ usuarioId: 'mae', usuarioNome: 'Mamãe 👩', texto: 'Amei! 😍' }]
                    }
                ];
                saveData();
            }
            
            const savedAvatars = localStorage.getItem('familia_avatars');
            if (savedAvatars) {
                try {
                    const avatars = JSON.parse(savedAvatars);
                    if (avatars.pai) USUARIOS.pai.avatarImg = avatars.pai;
                    if (avatars.mae) USUARIOS.mae.avatarImg = avatars.mae;
                } catch(e) {}
            }
            
            const savedPasswords = localStorage.getItem('familia_passwords');
            if (savedPasswords) {
                try {
                    const passwords = JSON.parse(savedPasswords);
                    if (passwords.pai) USUARIOS.pai.senha = passwords.pai;
                    if (passwords.mae) USUARIOS.mae.senha = passwords.mae;
                } catch(e) {}
            }
        }

        function saveData() {
            localStorage.setItem('familia_pro_data_v2', JSON.stringify(state.posts));
            console.log('Dados salvos!');
        }

        function saveAvatar(usuarioId, avatarData) {
            const avatars = JSON.parse(localStorage.getItem('familia_avatars') || '{}');
            avatars[usuarioId] = avatarData;
            localStorage.setItem('familia_avatars', JSON.stringify(avatars));
        }

        function savePassword(usuarioId, novaSenha) {
            const passwords = JSON.parse(localStorage.getItem('familia_passwords') || '{}');
            passwords[usuarioId] = novaSenha;
            localStorage.setItem('familia_passwords', JSON.stringify(passwords));
            USUARIOS[usuarioId].senha = novaSenha;
        }

        // FUNÇÃO PARA ADICIONAR POST (SALVA COMO dataUrl)
        function adicionarPost(tipo, dataUrl, legenda, isLive = false, liveInfo = null) {
            const novoPost = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 6),
                usuarioId: state.currentUser.id,
                usuarioNome: state.currentUser.nome,
                tipo: tipo,
                dataUrl: dataUrl,
                legenda: legenda || (tipo === 'foto' ? '📸 Nova foto!' : '🎥 Novo vídeo!'),
                data: new Date().toISOString(),
                curtidas: [],
                comentarios: []
            };
            
            if (isLive && liveInfo) {
                novoPost.isLiveRecording = true;
                novoPost.liveMessages = liveInfo.messages;
                novoPost.liveLikes = liveInfo.likes;
            }
            
            state.posts.unshift(novoPost);
            saveData();
            renderizarApp();
            return true;
        }

        // TIRAR FOTO COM A CÂMERA
        async function tirarFoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: state.cameraFacing }
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                stream.getTracks().forEach(track => track.stop());
                
                modalAdicionarLegenda(dataUrl, 'foto');
                
            } catch(err) {
                alert('Erro ao acessar câmera: ' + err.message);
            }
        }

        // GRAVAR VÍDEO COM A CÂMERA
        async function gravarVideo() {
            if (isRecording) {
                // Parar gravação
                if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
                    state.mediaRecorder.stop();
                    isRecording = false;
                    document.getElementById('btnGravar').textContent = '🎥 Gravar Vídeo';
                    document.getElementById('btnGravar').style.background = '#667eea';
                    
                    state.mediaRecorder.onstop = () => {
                        const blob = new Blob(state.recordedChunks, { type: 'video/mp4' });
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            modalAdicionarLegenda(e.target.result, 'video');
                        };
                        reader.readAsDataURL(blob);
                        state.recordedChunks = [];
                    };
                }
                return;
            }
            
            // Iniciar gravação
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: state.cameraFacing },
                    audio: true
                });
                
                const videoElement = document.getElementById('cameraPreview');
                if (videoElement) {
                    videoElement.srcObject = stream;
                    videoElement.play();
                }
                
                state.recordedChunks = [];
                state.mediaRecorder = new MediaRecorder(stream);
                state.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        state.recordedChunks.push(event.data);
                    }
                };
                state.mediaRecorder.start(1000);
                isRecording = true;
                
                document.getElementById('btnGravar').textContent = '⏹️ Parar Gravação';
                document.getElementById('btnGravar').style.background = '#dc3545';
                
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                cameraStream = stream;
                
            } catch(err) {
                alert('Erro ao gravar: ' + err.message);
            }
        }

        function modalAdicionarLegenda(dataUrl, tipo) {
            const modalHtml = `
                <div class="modal" id="legendaModal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>${tipo === 'foto' ? '📸 Adicionar Foto' : '🎥 Adicionar Vídeo'}</h3>
                            <button class="icon-btn" onclick="window.fecharModal()">✕</button>
                        </div>
                        <div class="modal-body">
                            <div style="text-align: center; margin-bottom: 15px;">
                                ${tipo === 'foto' 
                                    ? `<img src="${dataUrl}" style="max-width: 100%; max-height: 200px; border-radius: 15px;">`
                                    : `<video src="${dataUrl}" controls style="max-width: 100%; max-height: 200px; border-radius: 15px;"></video>`
                                }
                            </div>

        function importarDaGaleria() {

            input.onchange = (e) => {

        function curtirPost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post) {
                const idx = post.curtidas.indexOf(state.currentUser.id);
                if (idx === -1) {
                    post.curtidas.push(state.currentUser.id);
                    criarChuvaEmojis();
                } else {
                    post.curtidas.splice(idx, 1);
                }
                saveData();
                renderizarApp();
            }
        }

        function adicionarComentario(postId, texto) {
            if (!texto.trim()) return;
            const post = state.posts.find(p => p.id === postId);
            if (post) {
                post.comentarios.push({
                    usuarioId: state.currentUser.id,
                    usuarioNome: state.currentUser.nome,
                    texto: texto.trim(),
                    data: new Date().toISOString()
                });
                saveData();
                renderizarApp();
            }
        }

        function excluirPost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post && post.usuarioId === state.currentUser.id) {
                if (confirm('Excluir este post?')) {
                    state.posts = state.posts.filter(p => p.id !== postId);
                    saveData();
                    renderizarApp();

        // LIVE FUNCTIONS
        async function iniciarLive() {
            state.liveActive = true;
            state.liveMessages = [];
            state.liveLikes = 0;
            state.recordedChunks = [];
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: state.cameraFacing },
                    audio: true
                });
                
                const videoElement = document.getElementById('liveVideoElement');
                if (videoElement) {
                    videoElement.srcObject = stream;
                    videoElement.play();
                }
                
                state.mediaRecorder = new MediaRecorder(stream);
                state.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        state.recordedChunks.push(event.data);
                    }
                };
                state.mediaRecorder.start(2000);
                state.liveStream = stream;
                
            } catch (err) {
                alert('Erro ao acessar câmera: ' + err.message);
                state.liveActive = false;
            }
            
            renderizarApp();
            setTimeout(() => {
                adicionarMensagemLive('🎥 Live iniciada!', 'Sistema');
            }, 500);
        }

        function trocarCamera() {
            if (!state.liveActive) return;
            
            state.cameraFacing = state.cameraFacing === 'user' ? 'environment' : 'user';
            
            if (state.liveStream) {
                state.liveStream.getTracks().forEach(track => track.stop());
                if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
                    state.mediaRecorder.stop();
                }
                
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: state.cameraFacing },
                    audio: true
                }).then(stream => {
                    const videoElement = document.getElementById('liveVideoElement');
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        videoElement.play();
                    }
                    state.liveStream = stream;
                    state.recordedChunks = [];
                    state.mediaRecorder = new MediaRecorder(stream);
                    state.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            state.recordedChunks.push(event.data);
                        }
                    };
                    state.mediaRecorder.start(2000);
                }).catch(err => {
                    alert('Erro ao trocar câmera: ' + err.message);
                });
            }
        }

        function encerrarLive() {
            if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
                state.mediaRecorder.stop();
            }
            if (state.liveStream) {
                state.liveStream.getTracks().forEach(track => track.stop());
                state.liveStream = null;
            }
            state.liveActive = false;
            renderizarApp();
        }

        function adicionarMensagemLive(texto, usuario = null) {
            state.liveMessages.push({
                usuario: usuario || state.currentUser.nome,
                texto: texto,
                hora: new Date().toLocaleTimeString()
            });
            renderizarApp();

            }, 100);
        }

        function curtirLive() {
            state.liveLikes++;

        }

        function salvarLiveNoFeed() {
            if (state.recordedChunks.length === 0) {
                alert('Aguardando gravação. Aguarde 3 segundos e tente novamente.');
                return;
            }
            
            const videoBlob = new Blob(state.recordedChunks, { type: 'video/mp4' });
            const reader = new FileReader();
            reader.onload = (e) => {
                const liveInfo = {
                    messages: [...state.liveMessages],
                    likes: state.liveLikes
                };
                adicionarPost('video', e.target.result, `Live gravada 🔴`, true, liveInfo);
                alert('✅ Live salva no feed!');
                encerrarLive();
                state.activeTab = 'feed';
                renderizarApp();
            };
            reader.readAsDataURL(videoBlob);
        }

        function formatarData(dataISO) {
            const data = new Date(dataISO);
            const agora = new Date();
            const diff = agora - data;
            const minutos = Math.floor(diff / 60000);
            const horas = Math.floor(diff / 3600000);
            const dias = Math.floor(diff / 86400000);
            if (minutos < 1) return 'Agora';
            if (minutos < 60) return `${minutos} min`;
            if (horas < 24) return `${horas} h`;
            if (dias < 7) return `${dias} dias`;
            return data.toLocaleDateString('pt-BR');
        }

                            <span class="online-badge"></span>
                        </div>
                        <div class="header-actions">
                            <button class="icon-btn" onclick="window.modalPerfil()">⚙️</button>
                            <button class="icon-btn" onclick="window.logout()">🚪</button>
                        </div>
                    </div>
                    <div class="main-content">
                        ${renderizarFeed()}
                    </div>
                    <button class="fab" id="fabBtn">+</button>
                `;
            }
            
            const menuHtml = `
                <div class="bottom-nav">
                    <div class="nav-item ${state.activeTab === 'feed' ? 'active' : ''}" data-tab="feed">
                        <div class="nav-icon">📱</div>
                        <div class="nav-label">Feed</div>
                    </div>
                    <div class="nav-item ${state.activeTab === 'live' ? 'active' : ''}" data-tab="live">
                        <div class="nav-icon">📹</div>
                        <div class="nav-label">Live</div>
                    </div>
                </div>
            `;
            
            appDiv.innerHTML = conteudo + menuHtml;
            
            document.querySelectorAll('[data-tab]').forEach(el => {
                el.onclick = () => {
                    state.activeTab = el.dataset.tab;
                    renderizarApp();
                };
            });
            
            const fab = document.getElementById('fabBtn');
            if (fab) fab.onclick = () => renderizarModalCriacao();
        }

        function fazerLogin(perfil, senha, keepLoggedIn) {
            const usuario = USUARIOS[perfil];
            if (usuario && usuario.senha === senha) {
                state.currentUser = { ...usuario };
                state.keepLoggedIn = keepLoggedIn;
                
                if (keepLoggedIn) {
                    localStorage.setItem('familia_session', JSON.stringify({
                        userId: usuario.id,
                        expires: Date.now() + 30 * 24 * 60 * 60 * 1000
                    }));
                } else {
                    sessionStorage.setItem('familia_session', JSON.stringify({
                        userId: usuario.id,
                        expires: Date.now() + 24 * 60 * 60 * 1000
                    }));
                }
                renderizarApp();
                return true;
            }
            return false;
        }

        function logout() {
            state.currentUser = null;
            localStorage.removeItem('familia_session');
            sessionStorage.removeItem('familia_session');
            renderizarApp();
        }

        function checkAutoLogin() {
            const saved = localStorage.getItem('familia_session') || sessionStorage.getItem('familia_session');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    if (session.expires > Date.now() && USUARIOS[session.userId]) {
                        state.currentUser = { ...USUARIOS[session.userId] };
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        window.excluirPostHandler = excluirPost;
        window.curtirHandler = curtirPost;
        window.comentarHandler = (postId) => {
            const input = document.getElementById(`comentarioInput-${postId}`);
            if (input && input.value) {
                adicionarComentario(postId, input.value);
                input.value = '';
            }
        };
        window.focarComentario = (postId) => {
            const input = document.getElementById(`comentarioInput-${postId}`);
            if (input) input.focus();
        };
        window.fecharModal = fecharModal;
        window.logout = logout;
        window.modalPerfil = modalPerfil;
        window.modalAlterarSenha = modalAlterarSenha;
        window.modalFotoPerfil = modalFotoPerfil;
        window.iniciarLiveHandler = iniciarLive;
        window.encerrarLiveHandler = encerrarLive;
        window.curtirLiveHandler = curtirLive;
        window.trocarCameraHandler = trocarCamera;
        window.salvarLiveHandler = salvarLiveNoFeed;
        window.enviarMensagemLiveHandler = () => {
            const input = document.getElementById('liveInput');
            if (input && input.value) {
                adicionarMensagemLive(input.value);
                input.value = '';
                criarChuvaEmojis();
            }
        };
        window.tirarFotoHandler = tirarFoto;
        window.gravarVideoHandler = gravarVideo;

        loadData();
        if (checkAutoLogin()) {
            renderizarApp();
        } else {
            renderizarApp();
        }
    </script>
</body>
</html>
