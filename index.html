<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Família Connect - Corrigido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; }
        .app { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        
        /* Login */
        .login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: rgba(255,255,255,0.95); border-radius: 40px; padding: 35px 25px; width: 100%; max-width: 350px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .login-box h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .perfil-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .perfil-card { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 20px; text-align: center; cursor: pointer; background: white; }
        .perfil-card.selected { border-color: #667eea; background: #f0f0ff; }
        .perfil-avatar { font-size: 45px; display: block; margin-bottom: 8px; }
        .input-senha { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 15px; font-size: 16px; margin-bottom: 15px; }
        .checkbox-area { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* Feed */
        .feed-header { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .feed-header h2 { color: #667eea; }
        .fab { position: fixed; bottom: 80px; right: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: 55px; height: 55px; border-radius: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 200; border: none; font-size: 28px; color: white; }
        .main-content { padding-bottom: 70px; }
        
        /* Post */
        .post { background: white; margin-bottom: 12px; border-bottom: 1px solid #eee; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .post-avatar { width: 45px; height: 45px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .post-info { flex: 1; }
        .post-nome { font-weight: 700; }
        .post-data { font-size: 11px; color: #999; }
        .post-media { width: 100%; background: #f5f5f5; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; }
        .post-legenda { padding: 12px 15px; font-size: 14px; }
        .post-actions { padding: 8px 15px; display: flex; gap: 25px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .action-btn { background: none; border: none; display: flex; align-items: center; gap: 6px; font-size: 14px; color: #666; cursor: pointer; }
        .action-btn.liked { color: #dc3545; }
        .comentarios-area { padding: 10px 15px; background: #fafafa; }
        .comentario { font-size: 13px; margin-bottom: 8px; }
        .comentario strong { color: #667eea; }
        .add-comentario { padding: 10px 15px; display: flex; gap: 10px; background: white; }
        .add-comentario input { flex: 1; padding: 10px 15px; border: 1px solid #eee; border-radius: 25px; font-size: 13px; background: #f5f5f5; }
        .add-comentario button { background: #667eea; color: white; border: none; border-radius: 25px; padding: 8px 18px; cursor: pointer; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 30px; width: 100%; max-width: 400px; overflow: hidden; }
        .modal-header { padding: 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; margin: 15px 0; background: #f9f9f9; }
        .upload-area:hover { border-color: #667eea; background: #f0f0ff; }
        .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 15px; margin: 10px 0; }
        textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 15px; margin: 10px 0; font-family: Arial; resize: vertical; }
        .btn-publicar { background: #28a745; color: white; border: none; padding: 12px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-close { background: #dc3545; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .loading { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== CONFIGURAÇÃO ====================
    let currentUser = null;
    let posts = [];
    
    // Carregar dados salvos
    function carregarDados() {
        try {
            // Carregar posts
            const savedPosts = localStorage.getItem('familia_posts');
            if (savedPosts) {
                posts = JSON.parse(savedPosts);
                console.log('Posts carregados:', posts.length);
            } else {
                // Posts padrão
                posts = [
                    {
                        id: '1',
                        usuarioId: 'mae',
                        usuarioNome: 'Mamãe 👩',
                        tipo: 'foto',
                        dataUrl: 'https://picsum.photos/id/20/400/400',
                        legenda: 'Dia especial em família! 💕',
                        data: new Date().toISOString(),
                        curtidas: ['pai'],
                        comentarios: [{ usuarioId: 'pai', usuarioNome: 'Papai 👨', texto: 'Que lindo! 🥰' }]
                    },
                    {
                        id: '2',
                        usuarioId: 'pai',
                        usuarioNome: 'Papai 👨',
                        tipo: 'foto',
                        dataUrl: 'https://picsum.photos/id/15/400/400',
                        legenda: 'Final de semana top! 🎉',
                        data: new Date(Date.now() - 86400000).toISOString(),
                        curtidas: ['mae'],
                        comentarios: []
                    }
                ];
                salvarDados();
            }
            
            // Carregar sessão
            const session = localStorage.getItem('familia_session');
            if (session) {
                const sess = JSON.parse(session);
                if (sess.userId && sess.expires > Date.now()) {
                    currentUser = sess.userId === 'pai' ? 
                        { id: 'pai', nome: 'Papai 👨', senha: 'pai123' } : 
                        { id: 'mae', nome: 'Mamãe 👩', senha: 'mae123' };
                }
            }
        } catch(e) {
            console.error('Erro ao carregar:', e);
        }
    }
    
    function salvarDados() {
        try {
            localStorage.setItem('familia_posts', JSON.stringify(posts));
            console.log('Posts salvos:', posts.length);
        } catch(e) {
            console.error('Erro ao salvar:', e);
        }
    }
    
    function salvarSessao(userId, keep) {
        const expira = keep ? Date.now() + 30*24*60*60*1000 : Date.now() + 24*60*60*1000;
        localStorage.setItem('familia_session', JSON.stringify({ userId, expires: expira }));
    }
    
    function limparSessao() {
        localStorage.removeItem('familia_session');
    }
    
    // ==================== POSTAGEM ====================
    function adicionarPost(tipo, dataUrl, legenda) {
        const novoPost = {
            id: Date.now().toString(),
            usuarioId: currentUser.id,
            usuarioNome: currentUser.nome,
            tipo: tipo,
            dataUrl: dataUrl,
            legenda: legenda || (tipo === 'foto' ? '📸 Nova foto!' : '🎥 Novo vídeo!'),
            data: new Date().toISOString(),
            curtidas: [],
            comentarios: []
        };
        posts.unshift(novoPost);
        salvarDados();
        renderizarFeed();
        console.log('Post adicionado:', novoPost);
        return true;
    }
    
    // ==================== INTERAÇÕES ====================
    function curtirPost(postId) {
        const post = posts.find(p => p.id === postId);
        if (post) {
            const idx = post.curtidas.indexOf(currentUser.id);
            if (idx === -1) {
                post.curtidas.push(currentUser.id);
            } else {
                post.curtidas.splice(idx, 1);
            }
            salvarDados();
            renderizarFeed();
        }
    }
    
    function comentarPost(postId) {
        const input = document.getElementById(`comentarioInput-${postId}`);
        const texto = input.value;
        if (!texto.trim()) return;
        
        const post = posts.find(p => p.id === postId);
        if (post) {
            post.comentarios.push({
                usuarioId: currentUser.id,
                usuarioNome: currentUser.nome,
                texto: texto.trim(),
                data: new Date().toISOString()
            });
            salvarDados();
            input.value = '';
            renderizarFeed();
        }
    }
    
    function excluirPost(postId) {
        const post = posts.find(p => p.id === postId);
        if (post && post.usuarioId === currentUser.id) {
            if (confirm('Excluir este post?')) {
                posts = posts.filter(p => p.id !== postId);
                salvarDados();
                renderizarFeed();
                alert('✅ Post excluído!');
            }
        }
    }
    
    // ==================== UPLOAD ====================
    function abrirModalUpload() {
        const modalHtml = `
            <div class="modal" id="uploadModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>📤 Nova Publicação</h3>
                        <button onclick="fecharModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
                    </div>
                    <div class="modal-body">
                        <div class="upload-area" id="uploadArea">
                            📸 Clique para selecionar foto ou vídeo
                        </div>
                        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
                        <div id="previewDiv"></div>
                        <textarea id="legendaInput" rows="3" placeholder="Escreva uma legenda..."></textarea>
                        <button class="btn-publicar" id="publicarBtn">📤 Publicar</button>
                        <button class="btn-close" onclick="fecharModal()">Cancelar</button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        let selectedFile = null;
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewDiv = document.getElementById('previewDiv');
        
        uploadArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                const isVideo = selectedFile.type.startsWith('video/');
                previewDiv.innerHTML = isVideo ? 
                    `<video src="${url}" class="preview-img" controls></video>` :
                    `<img src="${url}" class="preview-img">`;
            }
        };
        
        document.getElementById('publicarBtn').onclick = async () => {
            if (!selectedFile) {
                alert('Selecione um arquivo!');
                return;
            }
            
            const legenda = document.getElementById('legendaInput').value;
            
            // Criar post diretamente com o arquivo
            const reader = new FileReader();
            reader.onload = (e) => {
                const tipo = selectedFile.type.startsWith('image/') ? 'foto' : 'video';
                adicionarPost(tipo, e.target.result, legenda);
                alert('✅ Publicado com sucesso!');
                fecharModal();
                URL.revokeObjectURL(URL.createObjectURL(selectedFile));
            };
            reader.readAsDataURL(selectedFile);
        };
    }
    
    function fecharModal() {
        const modal = document.querySelector('.modal');
        if (modal) modal.remove();
    }
    
    // ==================== RENDERIZAÇÃO ====================
    function formatarData(dataISO) {
        const data = new Date(dataISO);
        const diff = Date.now() - data;
        const minutos = Math.floor(diff / 60000);
        if (minutos < 1) return 'Agora';
        if (minutos < 60) return `${minutos} min`;
        if (minutos < 1440) return `${Math.floor(minutos / 60)} h`;
        return data.toLocaleDateString('pt-BR');
    }
    
    function renderizarFeed() {
        const container = document.getElementById('feedContainer');
        if (!container) return;
        
        if (posts.length === 0) {
            container.innerHTML = '<div class="loading">📭 Nenhum post ainda. Clique no + para começar!</div>';
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="post">
                <div class="post-header">
                    <div class="post-avatar">${post.usuarioId === 'pai' ? '👨' : '👩'}</div>
                    <div class="post-info">
                        <div class="post-nome">${post.usuarioNome}</div>
                        <div class="post-data">${formatarData(post.data)}</div>
                    </div>
                    ${post.usuarioId === currentUser.id ? `<button onclick="excluirPost('${post.id}')" style="background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>` : ''}
                </div>
                <div class="post-media">
                    ${post.tipo === 'foto' 
                        ? `<img src="${post.dataUrl}" loading="lazy" onerror="this.src='https://picsum.photos/400/400?error=1'">` 
                        : `<video src="${post.dataUrl}" controls></video>`}
                </div>
                ${post.legenda ? `<div class="post-legenda">💬 ${escapeHtml(post.legenda)}</div>` : ''}
                <div class="post-actions">
                    <button class="action-btn ${post.curtidas.includes(currentUser.id) ? 'liked' : ''}" onclick="curtirPost('${post.id}')">
                        ❤️ ${post.curtidas.length}
                    </button>
                    <button class="action-btn" onclick="document.getElementById('comentarioInput-${post.id}').focus()">
                        💬 ${post.comentarios.length}
                    </button>
                </div>
                <div class="comentarios-area">
                    ${post.comentarios.slice(-2).map(c => `
                        <div class="comentario"><strong>${escapeHtml(c.usuarioNome)}:</strong> ${escapeHtml(c.texto)}</div>
                    `).join('')}
                </div>
                <div class="add-comentario">
                    <input type="text" id="comentarioInput-${post.id}" placeholder="Escreva um comentário...">
                    <button onclick="comentarPost('${post.id}')">Enviar</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ==================== LOGIN ====================
    function login() {
        const perfil = document.getElementById('perfilSelecionado').value;
        const senha = document.getElementById('senha').value;
        const keep = document.getElementById('keepLogged').checked;
        
        if (perfil === 'pai' && senha === 'pai123') {
            currentUser = { id: 'pai', nome: 'Papai 👨', senha: 'pai123' };
            salvarSessao('pai', keep);
            renderizarApp();
        } else if (perfil === 'mae' && senha === 'mae123') {
            currentUser = { id: 'mae', nome: 'Mamãe 👩', senha: 'mae123' };
            salvarSessao('mae', keep);
            renderizarApp();
        } else {
            alert('❌ Senha incorreta!\n\nPapai: pai123\nMamãe: mae123');
        }
    }
    
    function logout() {
        currentUser = null;
        limparSessao();
        renderizarApp();
    }
    
    // ==================== TELA PRINCIPAL ====================
    function renderizarApp() {
        const appDiv = document.getElementById('app');
        
        if (!currentUser) {
            // Tela de login
            appDiv.innerHTML = `
                <div class="login-screen">
                    <div class="login-box">
                        <h1>📱 Família Connect</h1>
                        <div class="perfil-selector" id="perfilSelector">
                            <div class="perfil-card" data-perfil="pai">
                                <span class="perfil-avatar">👨</span>
                                <span class="perfil-nome">Papai</span>
                            </div>
                            <div class="perfil-card" data-perfil="mae">
                                <span class="perfil-avatar">👩</span>
                                <span class="perfil-nome">Mamãe</span>
                            </div>
                        </div>
                        <input type="hidden" id="perfilSelecionado" value="pai">
                        <input type="password" id="senha" class="input-senha" placeholder="Digite sua senha">
                        <div class="checkbox-area">
                            <input type="checkbox" id="keepLogged">
                            <label>Manter-me conectado</label>
                        </div>
                        <button class="login-btn" onclick="login()">✨ Entrar ✨</button>
                        <div style="margin-top:20px;text-align:center;font-size:12px;color:#999;">
                            👨 Papai: pai123 | 👩 Mamãe: mae123
                        </div>
                    </div>
                </div>
            `;
            
            // Selecionar perfil
            let perfilSelecionado = 'pai';
            document.querySelectorAll('[data-perfil]').forEach(el => {
                el.onclick = () => {
                    document.querySelectorAll('[data-perfil]').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                    perfilSelecionado = el.dataset.perfil;
                    document.getElementById('perfilSelecionado').value = perfilSelecionado;
                };
            });
            document.querySelector('[data-perfil="pai"]').classList.add('selected');
            return;
        }
        
        // Tela principal
        appDiv.innerHTML = `
            <div class="feed-header">
                <h2>📱 Família Connect</h2>
                <div>
                    <span style="margin-right:15px;">👤 ${currentUser.nome}</span>
                    <button onclick="logout()" style="background:none; border:none; font-size:20px; cursor:pointer;">🚪</button>
                </div>
            </div>
            <div class="main-content">
                <div id="feedContainer"></div>
            </div>
            <button class="fab" onclick="abrirModalUpload()">+</button>
        `;
        
        renderizarFeed();
    }
    
    // Expor funções globalmente
    window.login = login;
    window.logout = logout;
    window.curtirPost = curtirPost;
    window.comentarPost = comentarPost;
    window.excluirPost = excluirPost;
    window.abrirModalUpload = abrirModalUpload;
    window.fecharModal = fecharModal;
    
    // Iniciar app
    carregarDados();
    renderizarApp();
</script>
</body>
</html>
